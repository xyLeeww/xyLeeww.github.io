<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Controller body (red) -->
  <rect x="6" y="32" width="116" height="64" rx="8" fill="#C41E2A"/>
  <!-- Bottom edge (3D effect) -->
  <rect x="6" y="88" width="116" height="8" rx="4" fill="#8B1520"/>
  <!-- Gold panel -->
  <rect x="14" y="38" width="100" height="50" rx="4" fill="#D4A843"/>
  <!-- Gold panel darker border -->
  <rect x="14" y="38" width="100" height="50" rx="4" fill="none" stroke="#B8912E" stroke-width="1"/>
  <!-- Left dark area for D-pad -->
  <rect x="18" y="42" width="32" height="42" rx="3" fill="#2A2520"/>
  <!-- Player number label -->
  <rect x="22" y="44" width="12" height="12" rx="1" fill="#D4A843"/>
  <text x="28" y="54" text-anchor="middle" fill="#2A2520" font-size="10" font-family="Arial" font-weight="bold">I</text>
  <!-- D-pad vertical -->
  <rect x="28" y="60" width="10" height="22" rx="1" fill="#1A1A1A"/>
  <!-- D-pad horizontal -->
  <rect x="22" y="66" width="22" height="10" rx="1" fill="#1A1A1A"/>
  <!-- D-pad center circle -->
  <circle cx="33" cy="71" r="4" fill="#111"/>
  <!-- Gold horizontal lines -->
  <line x1="54" y1="62" x2="100" y2="62" stroke="#B8912E" stroke-width="1.5"/>
  <line x1="54" y1="72" x2="100" y2="72" stroke="#B8912E" stroke-width="1.5"/>
  <!-- Select button -->
  <rect x="56" y="66" width="14" height="5" rx="2.5" fill="#1A1A1A"/>
  <!-- Start button -->
  <rect x="56" y="76" width="14" height="5" rx="2.5" fill="#C41E2A"/>
  <!-- B button -->
  <circle cx="86" cy="71" r="7" fill="#1A1A1A"/>
  <circle cx="86" cy="71" r="5.5" fill="#2A2A2A"/>
  <!-- A button -->
  <circle cx="104" cy="71" r="7" fill="#1A1A1A"/>
  <circle cx="104" cy="71" r="5.5" fill="#2A2A2A"/>
  <!-- Cable -->
  <path d="M64 32 L64 20 Q64 16 60 16 L40 16" stroke="#1A1A1A" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>
